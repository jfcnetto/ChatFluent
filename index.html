<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
let lang = navigator.language.slice(0,2);
const base = "/ChatFluent/";
const supportedLangs = ['pt', 'en', 'es', 'fr', 'it', 'de', 'nl', 'pl', 'ru', 'tr', 'ja'];

if(supportedLangs.includes(lang)){
  location.href = base + lang + "/index.html";
} else {
  location.href = base + "en/index.html";
}
</script>
</head>
</html>
