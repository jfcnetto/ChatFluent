<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Aprender PT | ChatFluent</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/ChatFluent/css/style.css">
    <meta name="description" content="Aprenda PT de graça com o ChatFluent!">
</head>
<body>
<div id="header"></div>
<main class="container">
    <div style="text-align: center; padding: 50px;">
        <h1>SEO Landing Page: Aprender PT</h1>
        <p>Aprenda rápido e fácil! Interface em nl.</p>
        <a href="/ChatFluent/nl/historia.html?ui=nl&target=pt">
            <button>Começar Curso de PT</button>
        </a>
    </div>
</main>
<script>
    async function loadComponent(id, file) {
        try {
            const res = await fetch(file);
            const html = await res.text();
            document.getElementById(id).innerHTML = html;
        } catch (err) { }
    }
    loadComponent("header", "/ChatFluent/components/header.html");
</script>
</body>
</html>
