<div class="header" style="height: auto; min-height: 70px; padding: 10px 0;">
  <div class="container-header" style="display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1200px; margin: 0 auto; gap: 10px; padding: 0 15px; flex-wrap: wrap;">
    
    <!-- LOGO -->
    <div class="brand" style="flex-shrink: 0;">
      <a href="/ChatFluent/pt/index.html">
        <img src="/ChatFluent/img/logo.png" class="logo-img" alt="ChatFluent">
      </a>
    </div>

    <!-- SELETOR DE IDIOMAS (DROPDOWN) -->
    <nav class="languages-nav" style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; flex: 1;">
      <select id="uiLangSelect" style="padding: 8px; font-size: 14px; border-radius: 8px; font-weight: bold; border: 2px solid #e5e5e5; background: #fff; cursor: pointer;" onchange="changeUiLang()">
        <option value="pt">🇧🇷 Português</option>
        <option value="en">🇺🇸 English</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="it">🇮🇹 Italiano</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="nl">🇳🇱 Nederlands</option>
        <option value="pl">🇵🇱 Polski</option>
        <option value="ru">🇷🇺 Русский</option>
        <option value="tr">🇹🇷 Türkçe</option>
        <option value="ja">🇯🇵 日本語</option>
      </select>
      <script>
        // Seta o valor correto do dropdown com base na URL
        setTimeout(() => {
           // Descobre qual pasta de idioma estamos (pt, en, es) olhando para o pathname
           const pathMatch = window.location.pathname.match(/\/([a-z]{2})\/index\.html|\/([a-z]{2})\/historia\.html/);
           const ui = pathMatch ? (pathMatch[1] || pathMatch[2]) : 'pt';
           const select = document.getElementById('uiLangSelect');
           if (select) {
               select.value = ui;
           }
        }, 100);

        function changeUiLang() {
            const select = document.getElementById('uiLangSelect');
            if(select) {
                const ui = select.value;
                const isHistoria = window.location.pathname.includes('historia.html');
                
                // Pega os parametros atuais (se houver) para manter o target se estiver na tela do simulador
                const searchParams = new URLSearchParams(window.location.search);
                const target = searchParams.get('target') || 'en';
                
                // Constrói a nova URL baseada na pasta atual para evitar erros em testes locais file:///
                let newPath = window.location.pathname;
                
                // Substitui o idioma antigo (/pt/, /en/) pelo novo idioma (/ui/)
                newPath = newPath.replace(/\/[a-z]{2}\/(index|historia)\.html/, \`/\${ui}/$1.html\`);
                
                if (isHistoria) {
                    window.location.href = newPath + \`?ui=\${ui}&target=\${target}\`;
                } else {
                    window.location.href = newPath;
                }
            }
        }
      </script>
    </nav>

    <!-- MENU AUXILIAR COM BOTÃO -->
    <nav class="header-action" style="flex-shrink: 0;">
      <a href="#" onclick="javascript:window.location.href='/ChatFluent/' + document.getElementById('uiLangSelect').value + '/index.html'" class="btn" style="padding: 8px 16px; font-size: 14px; text-decoration: none; display: inline-block;">
        Home
      </a>
    </nav>
  </div>
</div>

<style>
  /* AJUSTE ESPECÍFICO PARA MOBILE */
  @media (max-width: 768px) {
    .header {
      height: auto !important;
    }
    .container-header {
      justify-content: center !important;
      gap: 15px !important;
    }
    .languages-nav {
      order: 3;
      width: 100%;
      justify-content: center !important;
      gap: 10px !important;
    }
    .brand {
      order: 1;
    }
    .header-action {
      order: 2;
    }
  }
</style>
