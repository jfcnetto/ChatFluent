<div class="header" style="height: auto; min-height: 70px; padding: 10px 0;">
  <div class="container-header" style="display: flex; align-items: center; justify-content: space-between; width: 100%; max-width: 1200px; margin: 0 auto; gap: 15px; padding: 0 15px; flex-wrap: wrap;">
    
    <!-- LOGO -->
    <div class="brand" style="flex-shrink: 0;">
      <a href="/ChatFluent/pt/index.html" id="headerLogoLink">
        <img src="/ChatFluent/img/logo.png" class="logo-img" alt="ChatFluent" id="headerLogoImg">
      </a>
    </div>

    <!-- MENU (CENTRALIZADO) -->
    <nav id="headerMenu" style="flex: 1; display: flex; justify-content: center; gap: 20px;">
      <a href="#" id="headerMenuHome" style="text-decoration: none; color: #333; font-weight: 600; font-size: 15px;">Home</a>
      <a href="#" id="headerMenuRegras" style="text-decoration: none; color: #333; font-weight: 600; font-size: 15px;">Regras</a>
      <a href="#" id="headerMenuContato" style="text-decoration: none; color: #333; font-weight: 600; font-size: 15px;">Contato</a>
    </nav>

    <!-- SELETOR DE IDIOMAS (CUSTOM DROPDOWN COM BANDEIRAS - ALINHADO À DIREITA) -->
    <nav class="languages-nav" style="display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; flex-shrink: 0;">
      <div class="custom-select-wrapper" id="headerUiSelectWrapper">
         <div class="custom-select-trigger" onclick="toggleHeaderDropdown(event)">
             <div style="display:flex; align-items:center; gap:8px;">
                 <img src="https://flagcdn.com/w20/br.png" id="headerUiFlag" alt="Flag">
                 <span id="headerUiText">Português</span>
             </div>
             <span class="arrow-icon">▼</span>
         </div>
         <div class="custom-options" id="headerUiOptions">
             <div class="custom-option" onclick="changeUiLang('pt', 'br', 'Português')">
                 <img src="https://flagcdn.com/w20/br.png" alt="pt"> Português
             </div>
             <div class="custom-option" onclick="changeUiLang('en', 'us', 'English')">
                 <img src="https://flagcdn.com/w20/us.png" alt="en"> English
             </div>
             <div class="custom-option" onclick="changeUiLang('es', 'es', 'Español')">
                 <img src="https://flagcdn.com/w20/es.png" alt="es"> Español
             </div>
             <div class="custom-option" onclick="changeUiLang('fr', 'fr', 'Français')">
                 <img src="https://flagcdn.com/w20/fr.png" alt="fr"> Français
             </div>
             <div class="custom-option" onclick="changeUiLang('it', 'it', 'Italiano')">
                 <img src="https://flagcdn.com/w20/it.png" alt="it"> Italiano
             </div>
             <div class="custom-option" onclick="changeUiLang('de', 'de', 'Deutsch')">
                 <img src="https://flagcdn.com/w20/de.png" alt="de"> Deutsch
             </div>
             <div class="custom-option" onclick="changeUiLang('nl', 'nl', 'Nederlands')">
                 <img src="https://flagcdn.com/w20/nl.png" alt="nl"> Nederlands
             </div>
             <div class="custom-option" onclick="changeUiLang('pl', 'pl', 'Polski')">
                 <img src="https://flagcdn.com/w20/pl.png" alt="pl"> Polski
             </div>
             <div class="custom-option" onclick="changeUiLang('ru', 'ru', 'Русский')">
                 <img src="https://flagcdn.com/w20/ru.png" alt="ru"> Русский
             </div>
             <div class="custom-option" onclick="changeUiLang('tr', 'tr', 'Türkçe')">
                 <img src="https://flagcdn.com/w20/tr.png" alt="tr"> Türkçe
             </div>
             <div class="custom-option" onclick="changeUiLang('ja', 'jp', '日本語')">
                 <img src="https://flagcdn.com/w20/jp.png" alt="ja"> 日本語
             </div>
         </div>
      </div>
      <script>
        const flagsMap = {
            'pt': { flag: 'br', name: 'Português' },
            'en': { flag: 'us', name: 'English' },
            'es': { flag: 'es', name: 'Español' },
            'fr': { flag: 'fr', name: 'Français' },
            'it': { flag: 'it', name: 'Italiano' },
            'de': { flag: 'de', name: 'Deutsch' },
            'nl': { flag: 'nl', name: 'Nederlands' },
            'pl': { flag: 'pl', name: 'Polski' },
            'ru': { flag: 'ru', name: 'Русский' },
            'tr': { flag: 'tr', name: 'Türkçe' },
            'ja': { flag: 'jp', name: '日本語' }
        };

        const menuTranslations = {
            'pt': { home: 'Home', rules: 'Regras', contact: 'Contato' },
            'en': { home: 'Home', rules: 'Rules', contact: 'Contact' },
            'es': { home: 'Inicio', rules: 'Reglas', contact: 'Contacto' },
            'fr': { home: 'Accueil', rules: 'Règles', contact: 'Contact' },
            'it': { home: 'Home', rules: 'Regole', contact: 'Contatti' },
            'de': { home: 'Startseite', rules: 'Regeln', contact: 'Kontakt' },
            'nl': { home: 'Home', rules: 'Regels', contact: 'Contact' },
            'pl': { home: 'Główna', rules: 'Zasady', contact: 'Kontakt' },
            'ru': { home: 'Главная', rules: 'Правила', contact: 'Контакты' },
            'tr': { home: 'Ana Sayfa', rules: 'Kurallar', contact: 'İletişim' },
            'ja': { home: 'ホーム', rules: 'ルール', contact: 'お問い合わせ' }
        };

        setTimeout(() => {
           const urlParams = new URLSearchParams(window.location.search);
           let ui = urlParams.get('ui');
           if (!ui) {
               const pathMatch = window.location.pathname.match(/\/([a-z]{2})\/index\.html|\/([a-z]{2})\/historia\.html|\/([a-z]{2})\/[a-z]+\.html/);
               ui = pathMatch ? (pathMatch[1] || pathMatch[2] || pathMatch[3]) : 'pt';
           }
           const isSeo = window.location.pathname.includes('/seo/');
           const depth = isSeo ? '../../' : '../';

           if(flagsMap[ui]) {
               document.getElementById('headerUiFlag').src = `https://flagcdn.com/w20/${flagsMap[ui].flag}.png`;
               document.getElementById('headerUiText').innerText = flagsMap[ui].name;
           }

           const tMenu = menuTranslations[ui] || menuTranslations['en'];
           const homeLink = document.getElementById('headerMenuHome');
           const rulesLink = document.getElementById('headerMenuRegras');
           const contactLink = document.getElementById('headerMenuContato');
           if (homeLink) {
               homeLink.innerText = tMenu.home;
               homeLink.href = `${depth}${ui}/index.html`;
           }
           if (rulesLink) {
               rulesLink.innerText = tMenu.rules;
               rulesLink.href = `${depth}${ui}/regras.html`;
           }
           if (contactLink) {
               contactLink.innerText = tMenu.contact;
               contactLink.href = `${depth}${ui}/contato.html`;
           }

           // Torna a logo dinâmica
           const logoLink = document.getElementById('headerLogoLink');
           const logoImg = document.getElementById('headerLogoImg');
           if (logoLink) logoLink.href = `${depth}${ui}/index.html`;
           if (logoImg) logoImg.src = `${depth}img/logo.png`;
        }, 100);

        function toggleHeaderDropdown(e) {
            e.stopPropagation();
            const wrapper = document.getElementById('headerUiSelectWrapper');
            const options = document.getElementById('headerUiOptions');
            wrapper.classList.toggle('open');
            options.classList.toggle('open');
        }

        document.addEventListener('click', () => {
            const wrapper = document.getElementById('headerUiSelectWrapper');
            const options = document.getElementById('headerUiOptions');
            if(wrapper && wrapper.classList.contains('open')) {
                wrapper.classList.remove('open');
                options.classList.remove('open');
            }
        });

        function changeUiLang(ui, flag, name) {
            const isHistoria = window.location.pathname.includes('historia.html');
            const searchParams = new URLSearchParams(window.location.search);
            const target = searchParams.get('target') || 'en';
            
            let newPath = window.location.pathname;
            newPath = newPath.replace(/\/[a-z]{2}\/([a-z0-9_-]+)\.html/, `/${ui}/$1.html`);
            
            // Caso especial de redirecionamento genérico se o replace falhar
            if (newPath === window.location.pathname) {
                const parts = window.location.pathname.split('/');
                const langIndex = parts.findIndex(p => flagsMap[p]);
                if (langIndex !== -1) {
                    parts[langIndex] = ui;
                    newPath = parts.join('/');
                }
            }
            
            if (isHistoria) {
                window.location.href = newPath + `?ui=${ui}&target=${target}`;
            } else {
                window.location.href = newPath;
            }
        }
      </script>
    </nav>


  </div>
</div>

<style>
  /* AJUSTE ESPECÍFICO PARA MOBILE */
  @media (max-width: 768px) {
    .header {
      height: auto !important;
    }
    .container-header {
      justify-content: center !important;
      gap: 15px !important;
    }
    .languages-nav {
      order: 3;
      width: 100%;
      justify-content: center !important;
      gap: 10px !important;
    }
    .brand {
      order: 1;
    }
    .header-action {
      order: 2;
    }
  }
</style>
