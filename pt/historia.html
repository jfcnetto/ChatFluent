<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Praticar inglês com histórias | ChatFluent</title>
    <meta name="description" content="Treine inglês com histórias interativas. Responda perguntas, ganhe pontos e evolua seu inglês gratuitamente com o ChatFluent.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/ChatFluent/css/style.css">
</head>

<body>

<!-- HEADER (DINÂMICO) -->
<div id="header"></div>

<!-- ADSENSE TOPO -->
<div id="main-banner">
    <script>
        document.write('<img src="/ChatFluent/img/banner-provisorio.png" style="display:block; width:100%; max-width:1000px; margin:0 auto;">');
    </script>
</div>

<main class="container">
    <section class="hero" style="text-align: center; padding: 20px 0;">
        <h1>Pratique inglês agora</h1>
        <p>Aprenda com situações do dia a dia e ganhe pontos.</p>
    </section>

    <!-- ÁREA DO SIMULADOR (CHAT STYLE) -->
    <div class="training-container" style="margin-top: 0;">
        
        <!-- CONTAINER DE PERGUNTA (Injetado via app.js com Avatar + Balão) -->
        <div id="pergunta" style="min-height: 70px;">
            <!-- O app.js injetará a estrutura <div class="chat-row"> aqui -->
        </div>

        <!-- OPÇÕES DO USUÁRIO (Injetadas via app.js) -->
        <div id="opcoes" class="options"></div>

        <!-- FEEDBACK E EXPLICAÇÃO (Aparece após a resposta) -->
        <div id="feedback" style="transition: 0.3s; margin-top: 20px; min-height: 30px; text-align: center;"></div>

        <!-- PLACAR DE PONTOS E PROGRESSO -->
        <div class="score-badge" style="display: flex; justify-content: center; gap: 15px; flex-wrap: wrap;">
            <span>🏆 Pontos: <span id="pontos">0</span></span>
            <span style="color: var(--border);">|</span>
            <span>Lição: <b id="progresso">1 de 15</b></span>
        </div>
    </div>
</main>

<!-- ADSENSE RODAPÉ -->
<div id="footer-banner" style="margin-top: 20px;">
    <script>
        document.write('<img src="/ChatFluent/img/banner-provisorio.png" style="display:block; width:100%; max-width:1000px; margin:0 auto;">');
    </script>
</div>

<!-- FOOTER (DINÂMICO) -->
<div id="footer"></div>

<!-- SCRIPTS DO APP -->
<script src="/ChatFluent/js/data.js"></script>
<script src="/ChatFluent/js/idiomas.js"></script>
<script src="/ChatFluent/js/app.js"></script>
<script src="/ChatFluent/js/adsense.js"></script>

<!-- CARREGAMENTO DE COMPONENTES -->
<script>
    async function loadComponent(id, file) {
        try {
            const res = await fetch(file);
            if (!res.ok) throw new Error(`Erro ao carregar ${file}`);
            const html = await res.text();
            document.getElementById(id).innerHTML = html;
        } catch (err) {
            console.error("Erro ao carregar componente:", file);
        }
    }
    loadComponent("header", "/ChatFluent/components/header.html");
    loadComponent("footer", "/ChatFluent/components/footer.html");
</script>

</body>
</html>
