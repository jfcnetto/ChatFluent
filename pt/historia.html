<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Praticar inglês com histórias | ChatFluent</title>
    <meta name="description" content="Treine inglês com histórias interativas. Responda perguntas, ganhe pontos e evolua seu inglês gratuitamente com o ChatFluent.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/ChatFluent/css/style.css">
</head>

<body>

<!-- HEADER (DINÂMICO) -->
<div id="header"></div>

<!-- ADSENSE TOPO -->
<div class="ads-slot"></div>

<main class="container">
    <section class="hero" style="margin-bottom: 20px;">
        <h1>Pratique inglês agora</h1>
        <p>Responda as perguntas abaixo e veja seu progresso em tempo real.</p>
    </section>

    <!-- ÁREA DE TREINO CENTRALIZADA -->
    <div class="training-container">
        <!-- PERGUNTA -->
        <h2 id="pergunta" class="question">Carregando pergunta...</h2>

        <!-- OPÇÕES (GERADAS PELO JS) -->
        <div id="opcoes" class="options"></div>

        <!-- FEEDBACK VISUAL -->
        <div id="feedback"></div>

        <!-- PLACAR DE PONTOS -->
        <div class="score-badge">
            🏆 Pontos: <span id="pontos">0</span>
        </div>
    </div>
</main>

<!-- ADSENSE FINAL -->
<div id="footer"></div>

<!-- SCRIPTS DO APP -->
<script src="/ChatFluent/js/data.js"></script>
<script src="/ChatFluent/js/idiomas.js"></script>
<script src="/ChatFluent/js/app.js"></script>
<script src="/ChatFluent/js/adsense.js"></script>

<!-- CARREGAMENTO DE COMPONENTES -->
<script>
    async function loadComponent(id, file) {
        try {
            const res = await fetch(file);
            const html = await res.text();
            document.getElementById(id).innerHTML = html;
        } catch (err) {
            console.error("Erro ao carregar componente:", file);
        }
    }
    loadComponent("header", "/ChatFluent/components/header.html");
    loadComponent("footer", "/ChatFluent/components/footer.html");
</script>

</body>
</html>
