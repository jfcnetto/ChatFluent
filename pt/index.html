<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">

<title>Aprender inglês grátis | ChatFluent</title>

<meta name="description" content="Aprenda inglês grátis com o ChatFluent! Pratique conversas reais, receba feedback imediato e evolua com histórias interativas online.">

<meta name="keywords" content="aprender inglês, inglês grátis, prática de inglês, conversação em inglês, aprender inglês online">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- CSS -->
<link rel="stylesheet" href="/ChatFluent/css/style.css">

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<!-- ADSENSE TOPO -->
<div class="ads-slot"></div>

<!-- HERO SECTION (NOVO LAYOUT MODERNO) -->
<div class="container">

  <div class="hero">

    <!-- TEXTO -->
    <div class="hero-text">

      <h1>Aprenda inglês grátis</h1>

      <p>Pratique inglês com histórias interativas e situações reais do dia a dia.</p>

      <p>Treine sua conversação, receba feedback imediato e evolua rapidamente.</p>

      <a href="/ChatFluent/pt/historia.html">
        <button>Começar agora</button>
      </a>

    </div>

    <!-- IMAGEM -->
    <div class="hero-image">
      <img src="/ChatFluent/img/hero.png" alt="Aprender inglês com ChatFluent">
    </div>

  </div>

</div>

<!-- ADSENSE FINAL -->
<div class="ads-slot"></div>

<!-- FOOTER -->
<div id="footer"></div>

<!-- SCRIPT ADSENSE -->
<script src="/ChatFluent/js/adsense.js"></script>

<!-- COMPONENTES -->
<script>
async function loadComponent(id, file) {
  const res = await fetch(file);
  const html = await res.text();
  document.getElementById(id).innerHTML = html;
}

loadComponent("header", "/ChatFluent/components/header.html");
loadComponent("footer", "/ChatFluent/components/footer.html");
</script>

</body>
</html>
