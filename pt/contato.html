<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Contato | ChatFluent</title>
    <meta name="description" content="Entre em contato com o ChatFluent para dúvidas, sugestões ou suporte sobre a plataforma de aprendizado de inglês.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/ChatFluent/css/style.css">
</head>

<body>

<!-- HEADER (DINÂMICO) -->
<div id="header"></div>

<!-- ADSENSE TOPO (BANNER PROVISÓRIO OU ADS) -->
<div id="main-banner">
    <script>
        document.write('<img src="/ChatFluent/img/banner-provisorio.png" style="display:block; width:100%; max-width:1000px; margin:0 auto;">');
    </script>
</div>

<main class="container">
    <!-- Seção consolidada para aproximar o título do conteúdo -->
    <div class="contact-wrapper">
        <section class="hero" style="margin-bottom: 10px;">
            <h1>Contato</h1>
            <p>Fale com a nossa equipe. Responderemos o mais rápido possível.</p>
        </section>

        <!-- Card de contato -->
        <div class="contact-card" style="margin-top: 0;">
            <form class="contact-form">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Seu melhor email" required>

                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" placeholder="Como podemos ajudar?" rows="5" required></textarea>

                <button type="submit" style="width: 100%;">Enviar Mensagem</button>
            </form>
        </div>
    </div>
</main>


<!-- ADSENSE TOPO (BANNER PROVISÓRIO OU ADS) -->
<div id="main-banner">
    <script>
        document.write('<img src="/ChatFluent/img/banner-provisorio.png" style="display:block; width:100%; max-width:1000px; margin:0 auto;">');
    </script>
</div>
<!-- FOOTER (DINÂMICO) -->
<div id="footer"></div>

<!-- SCRIPTS -->
<script src="/ChatFluent/js/adsense.js"></script>
<script>
    async function loadComponent(id, file) {
        try {
            const res = await fetch(file);
            if (!res.ok) throw new Error(`Erro ao carregar ${file}`);
            const html = await res.text();
            document.getElementById(id).innerHTML = html;
        } catch (err) {
            console.error(err);
        }
    }

    loadComponent("header", "/ChatFluent/components/header.html");
    loadComponent("footer", "/ChatFluent/components/footer.html");
</script>

</body>
</html>
