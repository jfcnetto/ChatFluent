<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">

<title>Contato | ChatFluent</title>

<meta name="description" content="Entre em contato com o ChatFluent para dúvidas, sugestões ou suporte sobre a plataforma de aprendizado de inglês.">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/ChatFluent/css/style.css">
</head>

<body>

<!-- HEADER (DINÂMICO) -->
<div id="header"></div>

<!-- ADSENSE TOPO -->
<div class="ads-slot"></div>

<div class="container">

<h1>Contato</h1>

<p>Fale com a equipe do ChatFluent. Responderemos o mais rápido possível.</p>

<!-- FORMULÁRIO SIMPLES -->
<form>

  <label>Nome</label><br>
  <input type="text" name="nome" placeholder="Seu nome" style="width:100%; padding:10px; margin:8px 0;"><br>

  <label>Email</label><br>
  <input type="email" name="email" placeholder="Seu email" style="width:100%; padding:10px; margin:8px 0;"><br>

  <label>Mensagem</label><br>
  <textarea name="mensagem" placeholder="Escreva sua mensagem" rows="5" style="width:100%; padding:10px; margin:8px 0;"></textarea><br>

  <button type="submit">Enviar</button>

</form>

</div>

<!-- ADSENSE FINAL -->
<div class="ads-slot"></div>

<!-- FOOTER (DINÂMICO) -->
<div id="footer"></div>

<!-- SCRIPTS -->
<script src="/ChatFluent/js/adsense.js"></script>

<script>
async function loadComponent(id, file) {
  const res = await fetch(file);
  const html = await res.text();
  document.getElementById(id).innerHTML = html;
}

loadComponent("header", "/ChatFluent/components/header.html");
loadComponent("footer", "/ChatFluent/components/footer.html");
</script>

</body>
</html>
